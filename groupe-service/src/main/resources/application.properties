spring.application.name=groupe-service
server.port=8082

spring.datasource.url=jdbc:postgresql://postgres-groupe-service:5432/groupe_service
spring.datasource.username=adrien
spring.datasource.password=franto
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP K8s Resilience
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=30000

# Disable OSIV to prevent lazy loading issues & show errors early
spring.jpa.open-in-view=false
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.jdbc=DEBUG