spring.application.name=travail-service
groupe.uri=http://groupe-service:8082

spring.datasource.url=jdbc:postgresql://postgres-travail-service:5432/travail_service
spring.datasource.username=postgres
spring.datasource.password=devsecops
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8081
spring.cloud.compatibility-verifier.enabled=false

# HikariCP K8s Resilience
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=60000
