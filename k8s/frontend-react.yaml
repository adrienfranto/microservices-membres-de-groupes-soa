# =====================================================================
# FRONTEND-REACT – Stable Local Configuration
# =====================================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-react
  namespace: microservices
  labels:
    app: frontend-react
spec:
  type: ClusterIP
  selector:
    app: frontend-react
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-react
  namespace: microservices
  labels:
    app: frontend-react
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-react
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 33%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend-react
    spec:
      containers:
        - name: frontend-react
          image: radrienfranto1/frontend-react:1.0
          ports:
            - containerPort: 80
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
---
