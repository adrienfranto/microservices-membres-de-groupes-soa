# =====================================================================
# BackendConfig – Load Balancing avancé GKE
# - Timeout connexion : 60s
# - Connection draining : 30s (zero-downtime rolling updates)
# - Health check personnalisé sur /health
# - Session affinity : CLIENT_IP pour api-gateway
# =====================================================================

# API Gateway – avec session affinity
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: backend-config-api-gateway
spec:
  timeoutSec: 60
  connectionDraining:
    drainingTimeoutSec: 30
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /actuator/health
    port: 9000
  sessionAffinity:
    affinityType: "CLIENT_IP"
    affinityCookieTtlSec: 0
---
# Frontend React – sans session affinity (stateless)
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: backend-config-frontend
spec:
  timeoutSec: 30
  connectionDraining:
    drainingTimeoutSec: 30
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /
    port: 80
---
# Etudiant Service
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: backend-config-etudiant
spec:
  timeoutSec: 60
  connectionDraining:
    drainingTimeoutSec: 30
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /actuator/health
    port: 8080
