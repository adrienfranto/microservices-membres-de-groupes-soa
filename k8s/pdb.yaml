# =====================================================================
# PodDisruptionBudget – Haute Disponibilité
# Garantit qu'au moins 1 pod reste disponible pendant :
#   - Nœud drainé (kubectl drain)
#   - Mise à jour de nœud GKE
#   - Maintenance du cluster
# =====================================================================

# API Gateway
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-api-gateway
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: api-gateway
---
# Etudiant Service
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-etudiant-service
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: etudiant-service
---
