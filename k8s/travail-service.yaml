# =====================================================================
# TRAVAIL-SERVICE – Production HA + Load Balancing + Haute Performance
# replicas: 2 | ClusterIP | probes | resources | topologySpread | priority
# =====================================================================
apiVersion: v1
kind: Service
metadata:
  name: travail-service
  namespace: microservices
  labels:
    app: travail-service-service
spec:
  type: ClusterIP
  selector:
    app: travail-service
  ports:
    - name: http
      protocol: TCP
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: travail-service
  namespace: microservices
  labels:
    app: travail-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travail-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 33%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: travail-service
    spec:
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms256m -Xmx256m"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-travail-service
  namespace: microservices
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: travail-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
