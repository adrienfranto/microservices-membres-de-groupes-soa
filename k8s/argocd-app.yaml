apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/adrienfranto/microservices-membres-de-groupes-soa.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
