# =====================================================================
# ETUDIANT-SERVICE – Production HA + Load Balancing + Haute Performance
# replicas: 2 | ClusterIP | probes | resources | topologySpread | priority
# =====================================================================
apiVersion: v1
kind: Service
metadata:
  name: etudiant-service
  namespace: microservices
  labels:
    app: etudiant-service
spec:
  type: ClusterIP
  selector:
    app: etudiant-service
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etudiant-service
  namespace: microservices
  labels:
    app: etudiant-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etudiant-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 33%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: etudiant-service
    spec:
      # ── Répartit les pods sur des nœuds différents (HA) ──
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: etudiant-images
              mountPath: /app/uploads/images
      volumes:
        - name: etudiant-images
          persistentVolumeClaim:
            claimName: etudiant-images-pvc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-etudiant-service
  namespace: microservices
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: etudiant-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
