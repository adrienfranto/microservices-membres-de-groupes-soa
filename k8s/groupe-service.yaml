# =====================================================================
# GROUPE-SERVICE – Stable Local Configuration
# =====================================================================
apiVersion: v1
kind: Service
metadata:
  name: groupe-service
  namespace: microservices
  labels:
    app: groupe-service-service
spec:
  type: ClusterIP
  selector:
    app: groupe-service
  ports:
    - name: http
      protocol: TCP
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: groupe-service
  namespace: microservices
  labels:
    app: groupe-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: groupe-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 33%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: groupe-service
    spec:
      containers:
        - name: groupe-service
          image: radrienfranto1/groupe-service:1.0
          ports:
            - containerPort: 8081
          imagePullPolicy: IfNotPresent
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms256m -Xmx256m"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
