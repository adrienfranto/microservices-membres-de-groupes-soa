# =====================================================================
# DATABASES – StatefulSets (Hyper-Light for Local Cluster)
# =====================================================================

# ---------------------------------------------------------------
# MongoDB – Headless Service + StatefulSet
# ---------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: microservices
  labels:
    app: mongodb
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - name: mongo
      protocol: TCP
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: microservices
  labels:
    app: mongodb
spec:
  serviceName: "mongodb-service"
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: adrien
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: franto
            - name: MONGO_INITDB_DATABASE
              value: etudiants
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-pvc

# ---------------------------------------------------------------
# PostgreSQL Groupe – Headless Service + StatefulSet
# ---------------------------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-groupe-service
  namespace: microservices
  labels:
    app: postgres-groupe
spec:
  clusterIP: None
  selector:
    app: postgres-groupe
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-groupe
  namespace: microservices
  labels:
    app: postgres-groupe
spec:
  serviceName: "postgres-groupe-service"
  replicas: 1
  selector:
    matchLabels:
      app: postgres-groupe
  template:
    metadata:
      labels:
        app: postgres-groupe
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: postgres-groupe
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: groupe_service
            - name: POSTGRES_USER
              value: adrien
            - name: POSTGRES_PASSWORD
              value: franto
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-groupe-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-groupe-data
          persistentVolumeClaim:
            claimName: postgres-groupe-pvc

